        // ========== کنترل ترکیبی (کیبورد + ماوس + جوی استیک) ==========
        function getControlVector() {
          let moveX = 0,
            moveY = 0;
          if (keys.ArrowUp) moveY = -1;
          if (keys.ArrowDown) moveY = 1;
          if (keys.ArrowLeft) moveX = -1;
          if (keys.ArrowRight) moveX = 1;

          if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
            mouseControl = false;

            // هماهنگ‌سازی جوی‌استیک با کیبورد
            if (joystick.enabled) {
              joystick.active = true;
              joystick.strength = 1;
              joystick.vector = { x: moveX, y: moveY };
              // محاسبه موقعیت هندل جوی‌استیک
              const angle = Math.atan2(moveY, moveX);
              joystick.x =
                joystick.center.x + Math.cos(angle) * joystick.radius;
              joystick.y =
                joystick.center.y + Math.sin(angle) * joystick.radius;
            }

            return { x: moveX, y: moveY, strength: 1, active: true };
          }

          if (mouseControl) {
            const dx = mouseX - joystick.center.x;
            const dy = mouseY - joystick.center.y;
            const dist = Math.hypot(dx, dy);
            if (dist > 5) {
              let str = Math.min(1, dist / joystick.radius);
              let angle = Math.atan2(dy, dx);
              return {
                x: Math.cos(angle),
                y: Math.sin(angle),
                strength: str,
                active: true,
              };
            }
          }

          if (joystick.active && joystick.strength > 0) {
            return {
              x: joystick.vector.x,
              y: joystick.vector.y,
              strength: joystick.strength,
              active: true,
            };
          }

          return { x: 0, y: 0, strength: 0, active: false };
        }

        function getCanvasCoords(e) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          let cx, cy;
          if (e.touches) {
            if (e.touches.length === 0) return null;
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
          } else {
            cx = e.clientX;
            cy = e.clientY;
          }
          return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
        }

        function updateJoystickFromTouch(pos) {
          if (!joystick.enabled) return;
          const dx = pos.x - joystick.center.x;
          const dy = pos.y - joystick.center.y;
          const dist = Math.hypot(dx, dy);
          let str = Math.min(1, dist / joystick.radius);
          let angle = Math.atan2(dy, dx);
          let lx, ly;
          if (dist > joystick.radius) {
            lx = joystick.center.x + Math.cos(angle) * joystick.radius;
            ly = joystick.center.y + Math.sin(angle) * joystick.radius;
          } else {
            lx = pos.x;
            ly = pos.y;
          }
          joystick.x = lx;
          joystick.y = ly;
          joystick.strength = str;
          joystick.vector = {
            x: Math.cos(angle) * str,
            y: Math.sin(angle) * str,
          };
        }

        function onStart(e) {
          e.preventDefault();
          const p = getCanvasCoords(e);
          if (p) {
            if (
              Math.hypot(p.x - joystick.center.x, p.y - joystick.center.y) <=
              joystick.radius + 25
            ) {
              joystick.active = true;
              updateJoystickFromTouch(p);
              mouseControl = false;
            } else {
              mouseControl = true;
              mouseX = p.x;
              mouseY = p.y;
            }
          }
        }

        function onMove(e) {
          if (!joystick.enabled) return;
          const p = getCanvasCoords(e);
          if (p) {
            if (joystick.active) {
              e.preventDefault();
              updateJoystickFromTouch(p);
              mouseControl = false;
            } else if (mouseControl) {
              mouseX = p.x;
              mouseY = p.y;
            }
          }
        }

        function onEnd(e) {
          joystick.active = false;
          joystick.x = joystick.center.x;
          joystick.y = joystick.center.y;
          joystick.vector = { x: 0, y: 0 };
          joystick.strength = 0;
          mouseControl = false;
        }

        function drawTrack() {
          const grad = ctx.createLinearGradient(0, 0, W, H);
          grad.addColorStop(0, "#0f172a");
          grad.addColorStop(1, "#1e1b2e");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);
          ctx.beginPath();
          for (let i = 0; i < trackLeftBound.length; i++) {
            if (i === 0) ctx.moveTo(trackLeftBound[i].x, trackLeftBound[i].y);
            else ctx.lineTo(trackLeftBound[i].x, trackLeftBound[i].y);
          }
          for (let i = trackRightBound.length - 1; i >= 0; i--) {
            ctx.lineTo(trackRightBound[i].x, trackRightBound[i].y);
          }
          ctx.closePath();
          ctx.fillStyle = "#2d2f36";
          ctx.fill();
          ctx.beginPath();
          for (let i = 0; i < trackLeftBound.length; i++) {
            if (i === 0) ctx.moveTo(trackLeftBound[i].x, trackLeftBound[i].y);
            else ctx.lineTo(trackLeftBound[i].x, trackLeftBound[i].y);
          }
          ctx.strokeStyle = "#5a5e6e";
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.beginPath();
          for (let i = 0; i < trackRightBound.length; i++) {
            if (i === 0) ctx.moveTo(trackRightBound[i].x, trackRightBound[i].y);
            else ctx.lineTo(trackRightBound[i].x, trackRightBound[i].y);
          }
          ctx.stroke();
          ctx.beginPath();
          for (let i = 0; i < trackPoints.length; i++) {
            if (i === 0) ctx.moveTo(trackPoints[i].x, trackPoints[i].y);
            else ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
          }
          ctx.strokeStyle = "#ffcc44";
          ctx.setLineDash([14, 22]);
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.setLineDash([]);
          if (finishLineStart && finishLineEnd) {
            const steps = 20;
            for (let i = 0; i < steps; i++) {
              const t1 = i / steps;
              const t2 = (i + 1) / steps;
              const x1 = finishLineStart.x * (1 - t1) + finishLineEnd.x * t1;
              const y1 = finishLineStart.y * (1 - t1) + finishLineEnd.y * t1;
              const x2 = finishLineStart.x * (1 - t2) + finishLineEnd.x * t2;
              const y2 = finishLineStart.y * (1 - t2) + finishLineEnd.y * t2;
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.lineWidth = 6;
              ctx.strokeStyle = i % 2 === 0 ? "#fff" : "#222";
              ctx.stroke();
            }
          }
        }

        function drawCar(
          x,
          y,
          angle,
          color,
          isPlayer = false,
          finished = false,
        ) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate((angle * Math.PI) / 180);
          ctx.shadowBlur = 3;
          ctx.globalAlpha = finished ? 0.7 : 1;

          // بدنه اصلی ماشین
          ctx.fillStyle = color;
          ctx.fillRect(-13, -8, 26, 16);

          // چرخ‌ها
          ctx.fillStyle = "#111";
          // چرخ جلو (راست)
          ctx.fillRect(8, -10, 4, 6);
          ctx.fillRect(8, 5, 4, 6);
          // چرخ عقب (چپ)
          ctx.fillRect(-12, -10, 4, 6);
          ctx.fillRect(-12, 5, 4, 6);

          ctx.globalAlpha = 1;
          ctx.restore();
        }

        function drawFlames(x, y, angle) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate((angle * Math.PI) / 180);
          for (let i = 0; i < 5; i++) {
            const offsetX = -16 - Math.random() * 8;
            const offsetY = (Math.random() - 0.5) * 8;
            const size = 4 + Math.random() * 6;
            const alpha = 0.6 + Math.random() * 0.4;
            ctx.beginPath();
            ctx.moveTo(offsetX, -3);
            ctx.lineTo(offsetX - size, 0);
            ctx.lineTo(offsetX, 3);
            ctx.fillStyle = `rgba(255, ${100 + Math.random() * 100}, 0, ${alpha})`;
            ctx.fill();
          }
          ctx.restore();
        }

        function drawJoystickUI() {
          ctx.shadowBlur = 0;
          ctx.globalAlpha = joystick.enabled ? 1 : 0.4;
          ctx.beginPath();
          ctx.arc(
            joystick.center.x,
            joystick.center.y,
            joystick.radius,
            0,
            Math.PI * 2,
          );
          ctx.fillStyle = "rgba(20,20,40,0.6)";
          ctx.fill();
          ctx.strokeStyle = "#ffaa55";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(
            joystick.x,
            joystick.y,
            joystick.handleRadius,
            0,
            Math.PI * 2,
          );
          ctx.fillStyle =
            joystick.active || mouseControl ? "#ff8844" : "#aa7755";
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // اصلاح تابع startCountdown
        function startCountdown(callback) {
          let count = 3;
          const overlay = document.createElement("div");
          overlay.className = "countdown-overlay";
          const numberDiv = document.createElement("div");
          numberDiv.className = "countdown-number";
          overlay.appendChild(numberDiv);
          document.body.appendChild(overlay);

          // غیرفعال کردن فیزیک در حین شمارش معکوس
          raceActive = false;

          // اطمینان از صفر بودن سرعت همه موجودیت‌ها
          player.velX = 0;
          player.velY = 0;
          for (let i = 0; i < bots.length; i++) {
            bots[i].velX = 0;
            bots[i].velY = 0;
            bots[i].currentBoost = 1.0;
            bots[i].nitroActive = false;
            bots[i].nitroEffect = false;
          }

          function updateCount() {
            if (count > 0) {
              numberDiv.textContent = count;
              numberDiv.className = "countdown-number";
              count--;
              setTimeout(updateCount, 1000);
            } else {
              numberDiv.textContent = "GO!";
              numberDiv.className = "countdown-go";
              setTimeout(() => {
                overlay.remove();
                raceActive = true; // فقط بعد از "GO!" فعال شود
                callback();
              }, 500);
            }
          }
          updateCount();
        }

        function checkOrientation() {
          const warning = document.getElementById("orientationWarning");
          if (warning) {
            if (window.innerHeight > window.innerWidth) {
              warning.style.display = "flex";
              if (raceActive) raceActive = false;
            } else {
              warning.style.display = "none";
              if (
                !raceActive &&
                !raceFinished &&
                !document.querySelector(".countdown-overlay") &&
                !document.querySelector(".message-overlay")
              ) {
                resetGame();
              }
            }
          }
        }

        function handleKeyDown(e) {
          if (
            e.key === "ArrowUp" ||
            e.key === "ArrowDown" ||
            e.key === "ArrowLeft" ||
            e.key === "ArrowRight"
          ) {
            e.preventDefault();
            keys[e.key] = true;
            mouseControl = false;
            joystick.active = false;
          }
          if (e.key === " " || e.key === "Space") {
            e.preventDefault();
            if (
              raceActive &&
              !player.finished &&
              joystick.enabled &&
              playerNitroRemaining > 0 &&
              !keys.Space
            ) {
              isNitroButtonPressed = true;
              keys.Space = true;
            }
          }
          if (e.key === "Escape") {
            e.preventDefault();
            if (raceActive && !raceFinished && !isPaused) {
              showPauseMenu();
            }
          }
        }

        function handleKeyUp(e) {
          if (
            e.key === "ArrowUp" ||
            e.key === "ArrowDown" ||
            e.key === "ArrowLeft" ||
            e.key === "ArrowRight"
          ) {
            e.preventDefault();
            keys[e.key] = false;

            // بازگشت جوی‌استیک به حالت مرکزی
            if (
              joystick.enabled &&
              !keys.ArrowUp &&
              !keys.ArrowDown &&
              !keys.ArrowLeft &&
              !keys.ArrowRight &&
              !mouseControl
            ) {
              joystick.active = false;
              joystick.x = joystick.center.x;
              joystick.y = joystick.center.y;
              joystick.vector = { x: 0, y: 0 };
              joystick.strength = 0;
            }
          }
          if (e.key === " " || e.key === "Space") {
            e.preventDefault();
            isNitroButtonPressed = false;
            keys.Space = false;
          }
        }

        // ==================== RESET GAME ====================
        function resetGame() {
          // پاک کردن منوی pause اگر باز است
          const pauseOverlay = document.getElementById("pauseOverlay");
          if (pauseOverlay) pauseOverlay.remove();

          const overlays = document.querySelectorAll(".message-overlay");
          overlays.forEach((overlay) => overlay.remove());

          isPaused = false;
          totalPausedTime = 0;
          pauseStartTime = 0;

          if (isMainMenu) return;

          raceActive = false;
          raceFinished = false;
          timerRunning = false;
          finishedCount = 0;

          joystick.enabled = true;
          isNitroButtonPressed = false;
          mouseControl = false;

          joystick.enabled = true;
          joystick.active = false;
          joystick.x = joystick.center.x;
          joystick.y = joystick.center.y;
          joystick.vector = { x: 0, y: 0 };
          joystick.strength = 0;
          mouseControl = false;

          // ریست کردن کلیدهای کیبورد
          keys.ArrowUp = false;
          keys.ArrowDown = false;
          keys.ArrowLeft = false;
          keys.ArrowRight = false;
          keys.Space = false;
          isNitroButtonPressed = false;

          // ریست وضعیت مسابقه (بدون تغییر اطلاعات دائمی)
          player.lap = 0;
          player.finished = false;
          player.bestLap = Infinity;
          player.currentLapTime = 0;
          player.totalTime = 0;
          player.velX = 0;
          player.velY = 0;
          player.lastGateSide = 0;
          player.stopPosition = null;
          player.nitroEffect = false;

          // تنظیم نیترو بر اساس سطح فعلی
          playerNitroRemaining = getCurrentNitroMax();

          currentRaceCoins = 0;
          currentRaceBotCoins = [0, 0, 0];

          for (let i = 0; i < bots.length; i++) {
            bots[i].lap = 0;
            bots[i].finished = false;
            bots[i].bestLap = Infinity;
            bots[i].lastLapTime = 0;
            bots[i].totalTime = 0;
            bots[i].velX = 0;
            bots[i].velY = 0;
            bots[i].lastGateSide = 0;
            bots[i].currentBoost = 1.0;
            bots[i].boostTimer = Math.floor(Math.random() * 30);
            bots[i].stopPosition = null;
            bots[i].nitroEffect = false;

            // تنظیم نیترو بر اساس سطح ارتقای ربات
            const botNitroMax = bots[i].customNitroMax || BASE_NITRO_MAX;
            bots[i].totalNitroRemaining = botNitroMax;
            bots[i].currentNitroDuration = 0;
            bots[i].nitroCooldown = 20 + Math.random() * 40;
            bots[i].nitroActive = false;
          }

          gateState = { player: false };
          lastSide = { player: 0 };
          for (let i = 0; i < BOT_COUNT; i++) {
            gateState[`bot${i}`] = false;
            lastSide[`bot${i}`] = 0;
          }

          resetPositions();
          updateUI();
          document.getElementById("finishedCountDisplay").innerHTML =
            `0/${TOTAL_RACERS}`;
          updateNitroButtonUI();
          updateCoinDisplay();

          startCountdown(() => {
            raceFinished = false;
            timerRunning = false;
            globalStartTime = performance.now();
            player.currentLapStart = performance.now();
            for (let i = 0; i < bots.length; i++) {
              bots[i].currentLapStart = performance.now();
            }
          });
        }

        // ==================== GAME LOOP ====================
        let lastTime = 0;
        function gameLoop(now) {
          // اگر در منوی اصلی هستیم، فقط درخواست فریم بعدی را بده
          if (isMainMenu) {
            // بررسی دوره‌ای ارتقای ربات‌ها در منوی اصلی
            autoUpgradeBotsInMenu(now);

            requestAnimationFrame(gameLoop);
            return;
          }

          if (!lastTime) lastTime = now;

          // اگر بازی در حالت pause است، فقط UI را بروزرسانی کن (بدون فیزیک)
          if (isPaused) {
            // رسم مسیر
            drawTrack();

            // رسم بات‌ها
            for (let bot of bots) {
              drawCar(bot.x, bot.y, bot.angle, bot.color, false, bot.finished);
              if (bot.nitroEffect && !bot.finished && raceActive)
                drawFlames(bot.x, bot.y, bot.angle);
            }

            // رسم بازیکن
            drawCar(
              player.x,
              player.y,
              player.angle,
              "#ff5533",
              true,
              player.finished,
            );
            if (player.nitroEffect && !player.finished && raceActive)
              drawFlames(player.x, player.y, player.angle);

            // رسم جوی استیک
            drawJoystickUI();

            // نمایش متن Paused روی صفحه
            ctx.font = "bold 42px 'Segoe UI', 'Poppins', system-ui";
            ctx.fillStyle = "#ffcc88";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.textAlign = "center";
            ctx.fillText("⏸ PAUSED", W / 2, H / 2 - 60);
            ctx.font = "20px monospace";
            ctx.fillStyle = "#aaaaff";
            ctx.fillText("Click RESUME to continue racing", W / 2, H / 2 + 20);
            ctx.font = "14px monospace";
            ctx.fillStyle = "#ff8866aa";
            ctx.fillText("Press ESC or tap PAUSE button", W / 2, H / 2 + 60);
            ctx.shadowBlur = 0;
            ctx.textAlign = "left";

            requestAnimationFrame(gameLoop);
            return;
          }

          const delta = Math.min(33, now - lastTime);
          lastTime = now;

          const control = getControlVector();

          // ========== آپدیت فیزیک بازی ==========
          if (raceActive && !raceFinished) {
            // حرکت بازیکن
            if (!player.finished && control.active) {
              const angleJoy = Math.atan2(control.y, control.x);
              let accMultiplier = 1.0;
              let nitroCurrentlyActive = false;

              if (
                isNitroButtonPressed &&
                playerNitroRemaining > 0 &&
                raceActive &&
                !player.finished
              ) {
                nitroCurrentlyActive = true;
                playerNitroRemaining--;
                accMultiplier = NITRO_MULTIPLIER;
                updateNitroButtonUI();
                if (playerNitroRemaining <= 0) isNitroButtonPressed = false;
              }

              player.nitroEffect = nitroCurrentlyActive;
              player.velX +=
                Math.cos(angleJoy) *
                BASE_ACC *
                control.strength *
                accMultiplier;
              player.velY +=
                Math.sin(angleJoy) *
                BASE_ACC *
                control.strength *
                accMultiplier;

              const targetAngle = (angleJoy * 180) / Math.PI;
              let diff = targetAngle - player.angle;
              if (diff > 180) diff -= 360;
              if (diff < -180) diff += 360;
              player.angle += diff * 0.19;
            } else if (!player.finished) {
              player.velX *= 1 - FRICTION;
              player.velY *= 1 - FRICTION;
              if (!isNitroButtonPressed) player.nitroEffect = false;
            }

            // محدودیت سرعت بازیکن
            if (!player.finished) {
              let spd = Math.hypot(player.velX, player.velY);
              let currentMaxSpeed = getCurrentMaxSpeed(); // استفاده از تابع جدید
              if (player.nitroEffect)
                currentMaxSpeed = getCurrentMaxSpeed() * NITRO_SPEED_MULTIPLIER;
              if (spd > currentMaxSpeed) {
                player.velX = (player.velX * currentMaxSpeed) / spd;
                player.velY = (player.velY * currentMaxSpeed) / spd;
              }

              let newX = player.x + player.velX;
              let newY = player.y + player.velY;
              let col = handleCollisionWithWall(player, newX, newY);
              player.x = col.x;
              player.y = col.y;
              player.velX = col.vx;
              player.velY = col.vy;
            }

            // آپدیت بات‌ها
            for (let i = 0; i < bots.length; i++)
              updateBot(bots[i], `bot${i}`, now);

            // برخورد بازیکن با بات‌ها
            for (let i = 0; i < bots.length; i++)
              if (!bots[i].finished && !player.finished)
                handleCarCollision(player, bots[i]);

            // برخورد بات‌ها با هم
            for (let i = 0; i < bots.length; i++)
              for (let j = i + 1; j < bots.length; j++)
                if (!bots[i].finished || !bots[j].finished)
                  handleCarCollision(bots[i], bots[j]);

            // بروزرسانی دور برای بازیکن
            updateLapForEntity(player, "player", now, true);
          }

          // ========== رسم صحنه ==========
          drawTrack();

          // رسم بات‌ها
          for (let bot of bots) {
            drawCar(bot.x, bot.y, bot.angle, bot.color, false, bot.finished);
            if (bot.nitroEffect && !bot.finished && raceActive)
              drawFlames(bot.x, bot.y, bot.angle);
          }

          // رسم بازیکن
          drawCar(
            player.x,
            player.y,
            player.angle,
            "#ff5533",
            true,
            player.finished,
          );
          if (player.nitroEffect && !player.finished && raceActive)
            drawFlames(player.x, player.y, player.angle);

          // رسم جوی استیک
          drawJoystickUI();

          requestAnimationFrame(gameLoop);
        }

        // ==================== SETUP ====================
        function setup() {
          initGame();

          // مخفی کردن UI بازی در ابتدا
          document
            .querySelector(".stats-panel")
            .classList.add("game-ui-hidden");
          document
            .getElementById("nitroButton")
            .classList.add("game-ui-hidden");
          document.getElementById("pauseBtn").classList.add("game-ui-hidden");
          document
            .getElementById("fullscreenBtn")
            .classList.add("game-ui-hidden");

          // نمایش منوی اصلی
          document.getElementById("mainMenu").style.display = "block";
          document.getElementById("fullscreenMenuBtn").style.display = "flex";
          document.querySelector(".menu-coins").style.display = "flex";

          // بروزرسانی نمایش سکه
          updateMenuCoinDisplay();

          // شروع انیمیشن ماشین
          drawMainMenuCar();

          // دکمه استارت
          const startBtn = document.getElementById("startGameBtn");
          if (startBtn) {
            startBtn.addEventListener("click", () => {
              hideMainMenu();
            });
          }

          // دکمه فول اسکرین در منو
          const fullscreenMenuBtn =
            document.getElementById("fullscreenMenuBtn");
          if (fullscreenMenuBtn) {
            fullscreenMenuBtn.addEventListener("click", toggleFullscreen);
          }

          // دکمه ارتقا
          const upgradeBtn = document.getElementById("upgradeBtn");
          if (upgradeBtn) {
            upgradeBtn.addEventListener("click", () => {
              if (isMainMenu) {
                showUpgradeConfirm();
              }
            });
          }

          // دکمه ریست کامل
          const resetAllBtn = document.getElementById("resetAllBtn");
          if (resetAllBtn) {
            resetAllBtn.addEventListener("click", () => {
              if (isMainMenu) {
                showResetConfirm();
              }
            });
          }

          // دکمه فول اسکرین در بازی
          const fullscreenBtn = document.getElementById("fullscreenBtn");
          if (fullscreenBtn) {
            fullscreenBtn.addEventListener("click", toggleFullscreen);
          }

          // دکمه Pause در بازی
          const pauseBtn = document.getElementById("pauseBtn");
          if (pauseBtn) {
            pauseBtn.addEventListener("click", () => {
              if (raceActive && !raceFinished && !isPaused) {
                showPauseMenu();
              }
            });
          }

          // دکمه نیترو
          const nitroBtn = document.getElementById("nitroButton");
          if (nitroBtn) {
            const activateNitro = (e) => {
              e.preventDefault();
              if (
                raceActive &&
                !player.finished &&
                joystick.enabled &&
                playerNitroRemaining > 0
              )
                isNitroButtonPressed = true;
            };
            const deactivateNitro = (e) => {
              e.preventDefault();
              isNitroButtonPressed = false;
            };
            nitroBtn.addEventListener("mousedown", activateNitro);
            nitroBtn.addEventListener("mouseup", deactivateNitro);
            nitroBtn.addEventListener("mouseleave", deactivateNitro);
            nitroBtn.addEventListener("touchstart", activateNitro, {
              passive: false,
            });
            nitroBtn.addEventListener("touchend", deactivateNitro);
            nitroBtn.addEventListener("touchcancel", deactivateNitro);
          }

          // رویدادهای کیبورد
          window.addEventListener("keydown", handleKeyDown);
          window.addEventListener("keyup", handleKeyUp);

          // رویدادهای موس و تاچ برای جوی استیک
          canvas.addEventListener("mousedown", onStart);
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onEnd);
          canvas.addEventListener("touchstart", onStart, { passive: false });
          canvas.addEventListener("touchmove", onMove, { passive: false });
          canvas.addEventListener("touchend", onEnd);

          // رویداد resize
          window.addEventListener("resize", () => {
            if (!isMainMenu) {
              initGame();
              checkOrientation();
              if (
                !raceActive &&
                !document.querySelector(".countdown-overlay") &&
                !document.querySelector(".message-overlay") &&
                !(window.innerHeight > window.innerWidth)
              ) {
                startCountdown(() => {
                  raceActive = true;
                  raceFinished = false;
                  timerRunning = false;
                  globalStartTime = performance.now();
                  player.currentLapStart = performance.now();
                  for (let i = 0; i < bots.length; i++)
                    bots[i].currentLapStart = performance.now();
                });
              }
            }
          });

          // بررسی orientation
          window.addEventListener("resize", checkOrientation);
          checkOrientation();

          // شروع حلقه بازی
          requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener("mousedown", onStart);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onEnd);
        canvas.addEventListener("touchstart", onStart, { passive: false });
        canvas.addEventListener("touchmove", onMove, { passive: false });
        canvas.addEventListener("touchend", onEnd);
        window.addEventListener("resize", () => {
          initGame();
          checkOrientation();
          if (
            !raceActive &&
            !document.querySelector(".countdown-overlay") &&
            !document.querySelector(".message-overlay") &&
            !(window.innerHeight > window.innerWidth)
          ) {
            startCountdown(() => {
              raceActive = true;
              raceFinished = false;
              timerRunning = false;
              globalStartTime = performance.now();
              player.currentLapStart = performance.now();
              for (let i = 0; i < bots.length; i++)
                bots[i].currentLapStart = performance.now();
            });
          }
        });
        setup();
      })();
    </script>
  </body>
</html>
